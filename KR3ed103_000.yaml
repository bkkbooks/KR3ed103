body:
  text: 救自縊良方凡自縊高懸者徐徐抱住不可截斷繩索但緩緩解下安被放臥微微拈正喉嚨以腳掩其口鼻勿令透氣令一人以腳踏其兩肩以手挽其頂發常令緊急不可使頭垂下一人以手摩擦其胸臆啟動之一人摩擦其手足屈伸之若已僵直但漸漸強屈之又按其腹一人以腳裹衣抵其糞門勿令泄氣如此一飯時即氣從口出呼吸眼開勿苦勞動又以官桂湯及粥飲與之令潤咽喉更以二人以筆管吹其耳內若以此救無不活者此法自旦至暮雖己冷可活自暮至旦陰氣盛為難救心下微溫者雖一日以上亦可活百發百中又法細辛皂角等分研末如大豆許吹兩鼻孔又法治自縊氣已脫極重者只灸湧泉穴在足底心男左女右灸三壯即活又法取活鵝嘴入口內鵝鳴應聲即活又法刺雄雞冠血滴入口中即活不可將茶水灌又法以手緊掩鼻口勿令通氣兩時許氣急即活又法以野山羊血二三分研極細末以好酒灌下立愈官桂湯廣皮八分厚朴一錢肉桂五分製半夏一錢乾薑三分甘草三分救溺死凡溺死者先以刀干開溺者口橫箸一隻令其牙銜之可使水出又令一健夫屈溺人兩足放肩上以背相貼倒駝而行令其水出即活一法先取燥土或壁土置地上將溺者仰臥於上更以土覆之只露口眼自然水氣吸入土中其人即醒仍急用竹管各於口耳鼻臍糞門內更迭吹之令上下相通即醒又方用半夏末搐其鼻又法皂角末綿裹塞糞門須臾出水即活又法炒熱沙敷死人面上下著沙只留出口眼耳鼻沙濕冷又換數易即蘇又法醋半盞灌鼻中又法用雄雞冠血滴入口鼻內又法倒懸以好酒灌鼻中及下部又倒懸去濕衣並去臍中垢令二人以筆管吹其耳方用艾灸其臍數壯即活一法取梯乘其人倒掛用鹽塞鼻填滿鹽化即醒並將鹽堆臍上又法以鴨血灌之即活又法撈起時急急將口撬音轎開橫銜箸一隻使可出水以竹管吹其兩耳碾生半夏吹其鼻孔以皂角末置管中吹其穀道如系夏月將溺人肚皮橫覆牛背之上兩邊使人扶住牽牛緩緩行走腹中之水自然從口中並大小便流出再用生薑湯化蘇合丸灌之或單用薑湯灌之亦可若無牛以活人覆臥弓腰令溺人如前將肚腹橫覆於活人身上令活人動搖水亦可出若一時無牛活人又不肯拯救則用鍋一口將溺人覆於鍋上亦可如系冬月急將濕衣解去為之更換一面炒鹽用布包熨臍一面厚鋪被褥取灶內不著草灰多多鋪於被褥之上令溺人覆臥於上臍下墊以棉枕一個仍以草灰將渾身厚蓋之灰上再加被褥不可使灰瞇於眼內按灰性暖而能救水凡蠅溺水死者以灰埋之少刻即活此明驗也其撬口銜箸灌蘇合丸或生薑湯及吹耳鼻穀道等事皆同冬天甦醒後宜略飲溫酒夏天甦醒後宜略飲粥湯又法以酒罈一個紙片一把燒放壇內急以壇口覆臍上冷再燒紙片放壇內覆臍去水即活又法初撈起時尚有微氣急令生人脫貼身裹衣為之更換抱擔身上將屍微微頃倒之以箸放溺人牙內尤妙令其腹內水流出若水往外流即有生機一面用粗紙燎灼取煙燻其鼻竅稍熏片時即用皂角研細吹入鼻竅但得有一噴嚏即可得生救凍死凡凍死但胸前有微溫者冬月落水即時撈起吸水不多有微氣者脫去濕衣隨解活人熱衣包暖余與救凍死同用米炒熱囊盛熨心上冷即換之或炒灶灰熨其心亦可候目開氣回後以溫酒或薑湯及粥飲稍稍灌之若先將火烘必死救時倘微笑急為掩其口鼻如不掩則笑不止莫可救矣一用雄黃焰硝等分為末點兩眼角凡凍死已救活者宜用生薑連皮搗碎陳皮銼細各一兩水三碗煎一碗半溫服又法用氈或藁薦卷之以索系定放在平穩處令二人對踏輕輕滾轉往來如擀氈法俟四肢溫即活救五絕中惡卒死或先病或睡臥間忽然而絕皆是中惡也夜間原無燈者不可用火照急取鴨血熱灌下喉間即活又用蒜頭搗汁灌入鼻中即活或韭菜汁亦可一方用皂角末吹其鼻孔或生半夏末亦可又法視上唇沿有如粟米粒大小泡以針刺破又方用羊屎燒煙燻鼻中又法棉浸好醋半盞手按令汁入鼻中及捉其兩手勿令驚須臾即活又方用生菖蒲研汁一盞灌之中惡驚悶用雄雞冠血滴口塗面吹鼻即蘇邪魅浸人用鱉甲同蒼朮焚之即絕救驚死以好酒一二杯灌之即活救壓死及墜跌死凡壓死及墜跌死心頭溫者急扶坐起將手提其發用半夏末吹入鼻內少蘇以生薑汁同菜油調勻灌之次取散血藥服如無藥以小便灌之一方取向東桃柳枝各七寸煎湯灌下救魘死凡中惡魘死者不得近前急叫但吹其面不醒即咬腳跟及拇指頻呼其名灌以薑湯必活一法略移動臥處徐徐喚之原有燈者存之如無燈者不可用燈照又方以皂角末如大豆許吹兩鼻內得嚏即醒又方研韭菜汁灌鼻中冬月用根亦可得嚏一法用筆管吹兩耳及取病人頭髮十四根拈繩刺其耳內又鹽開水一杯加薑汁兩匙灌之又法用艾灸兩足大拇趾生毛處三壯或七壯總治卒死三方凡溺死縊死魘死急用韭菜搗汁灌鼻中得皂角末麝香同灌更快捷凡五絕皆以生半夏為末冷水為丸如豆大納鼻中即愈心溫者一日可治又於人中穴及兩足大趾甲離肉一線各灸三壯凡卒死以生半夏吹入鼻中又治產後暈死神效凡卒暴惡死或縊死或奄忽死心頭微溫者蔥心黃莖男左女右入鼻孔三四寸鼻目出血者有生機也凡人涎潮於心卒然倒地急扶入暖室正坐用火炭沃醋氣衝入鼻內即蘇或搗韭菜汁入喉中亦妙中風中暑中毒霍亂中暍各症俱詳內科凡中風中暑中毒中惡乾霍亂一切速暴之症以生薑自然汁和童便服立愈暑天中暍死切勿飲冷水急取灶間灰或道上熱土壅其臍間一窩淋以熱湯或溺立愈救諸傷跌打損傷秘方雖重傷頻死但有氣者灌之可蘇其方或於重陽日或於十一月採野菊連枝葉陰乾每用菊花一兩加童便無灰酒各一碗同煎熱服神效若已氣絕不能言者急用韭菜汁和童便一盞灌之亦可治跌打損傷昏迷不省人事神效方蘇木白麻皮細木耳以上各二錢俱方瓦上焙焦木耳更要焦為妙共為末黃酒同黑糖調服服後將酒飲醉避風處睡一宿即愈跌打及牆壁壓傷驗方川麻一分木香二分紅花三分甘草四分共研末黃酒送下藥均生用凡傷磕損及爛入寸許者千年石灰輕粉血竭白蠟研末摻之外以隨便膏藥蓋上立愈如配藥不拘多少各等分金瘡或磕損折傷血出不止疼痛難忍蔥白砂糖等分研為泥封日其痛立止金刃傷用龍眼核剝淨外面光皮只用其仁搗研極細末填敷傷口即愈治閃跌挫痛並風寒襲人經絡舉動不便梔子七枚杏仁七粒共研為末入雞蛋清一個量加燒酒麥面打成稠糊敷患處隔宿撥出青藍色即愈救殺傷未破膜方凡金瘡及折傷不可飲冷水又忌嗔怒及大聲動作勞力凡殺傷不透膜者用乳香沒藥各一塊如皂角子大研爛以小便半盞好酒半盞同煎通口服然後以花蕊石散敷傷口上立止或用烏賊骨為末敷之亦妙七釐散方治跌打損傷不論金刃他物傷至骨斷筋折血流不止者並皆治之為金瘡第一方古之七釐今之三分驗傷者隨時帶用甚便上硃砂用水飛淨一錢二分真麝香一分二釐冰片一分二釐乳香去油一錢五分沒藥一錢五分真血竭一兩紅花一錢五分兒茶二錢四分以上各藥選黃道吉日端節日午時尤好共為細末瓷瓶收貯黃蠟封口每服七粒燒酒或黃酒衝下傷處用藥七八分調敷極效如傷重多調些血多亦加敷干藥末如金刃傷重或食嗓割斷用雞皮急為包裹用些藥末乾摻定痛止血立時見效並治一切無名腫毒亦用前法量瘡之大小調敷神效孕婦則可敷不可服刀械殺傷氣尚未絕凡金瘡敷藥後須避風濕亦忌水洗如要換藥須濃煎湯避風洗之再上藥急用蔥白熱鍋內炒熱遍敷傷處繼而呻吟易蔥再敷俟蘇定用三七研末以津即口水也調敷立愈刀傷跌打傷血出不止凡金瘡諸傷暈絕者急用熱尿多灌即蘇童尿尤好用紫藤香即降香之佳者瓷瓦鐮刮下石碾碾細凡此皆忌銅鐵之故敷之血立止又無瘢痕又刃傷痛不可止用好雞骨灰擲地上鏗然有聲者與松香明透者等分捶成一塊再多用韭菜汁拌入陰乾如此拌捶三四遍後為細末收貯上巳端午七夕或黃道吉日製就敷患處完好如常血流不止用千年石灰研細末敷之立效又韭菜同陳石灰搗成餅沾貼牆上候乾研細篩下敷患處止血如神又硃砂末白糖對配敷之亦止痛生肌又取藕一枝去節連皮搗爛掩上即止血又松香和生半夏為末敷之亦效又石灰略陳者亦可用六兩和大黃一兩同炒至桃花色去大黃再篩用之尤妙或用乾麵粉和白糖撒傷處亦效又方真降香切片火上炙去油荔枝核血竭等分為細末敷患處立效雖斷指亦能續又方三七末海螵蛸去硬殼龍眼核剝去外光皮各研末敷之俱效金瘡腸出用口噙新吸水忽噀其面令寒噤即入腸入後用麻繩縫好用七釐散或花蕊石散搽之用小麥五升水九升煮至四升綿布濾淨汁待極冷令病人臥席上一人含汁噀其瘡上並噴其背則腸暫入噀時勿令病人知及多人在旁言語如未入抬席四角輕搖則自入既入者當用麻油潤線縫緊或用麻線或桑白皮尖茸為線麻油潤之不可縫外重皮留皮開摻藥生肉仍以潤帛扎束慎勿驚動使瘡口復迸開仍服芎歸湯或七釐散亦好總勿令大小便秘澀為要金瘡磕損折傷血出痛甚用蔥白砂糖等分研封之又無疤痕又方川貝母一錢去心杏仁去皮尖七粒同嚼掩患處一日一換又方魚膠一錢融化封之另以酒服一錢皆可止痛愈刀傷急治方用柿餅搗爛塗之血止自合打傷方用白蠟一兩藤黃三錢入麻油熔化塗傷處立愈此方止痛止血及湯火傷皆神效撲打猝死凡五絕及撲打猝死等皆須心頭尚溫雖經日亦可救先將死人盤屈在地上如僧打坐狀令一人將死人頭髮控放低用生半夏末吹在鼻內如活以生薑自然汁灌之再用乾荷葉燒灰熱小便調下三錢日進三服自愈打撲傷腕折有瘀血作痛取麻根並葉搗取汁飲無則乾麻煮汁飲亦可又稻稈燒灰以酒糟淋灰取汁乘溫淋洗痛處立效又酒糟和醋滓蒸溫熨之立愈又芥子和生薑研微暖塗貼患處即效暈在地者用血管鵝毛煅存性一錢乳香沒藥百草霜各一錢共為末老酒調灌救跌壓重傷不可多人環繞嘈雜致令傷者驚魂不復傷重者口耳出血一時昏暈若面色尚有生氣身體尚綿軟皆可救急令親人扶而呼之坐於地上以膝抵其穀道勿令泄氣若稍知覺即移於素所寢處將室內遮暗仍拳手足緊抱不可令臥亦以膝抵其穀道急取熱童便灌之馬溺尤妙如二者均不可急得用人溺未食蔥蒜者去其頭尾亦可即強灌下一二杯下得喉便好急用四物湯當歸一兩川芎三錢生地五錢白芍炒五錢加桃仁去皮尖紅花各五錢山楂搗碎一兩生大黃一兩童便一大碗如夏月加黃連三分以上兩數傷重者加倍用急流水二大碗在傷者旁用急火煎八分傾碗內承於傷者鼻下令藥氣透入腹乘熱用小鐘灌之如不受少停再灌以漸灌盡勿令臥服藥後尤須緊抵穀道勿令泄氣不救俟腹中動而有聲上下往來數遍急不能待方可翼之以解所下盡屬瘀紫毒已解半方可令睡如前劑再服兩三劑至所下盡為糞即停止凡卒暴墮攧築倒及鬼魘死若肉未冷急以酒調蘇合香丸灌入口若下喉去可活或先飲熱童便亦可又雞鳴散治打撲傷瘀血凝積煩悶者大黃酒蒸五錢歸尾三錢桃仁搗十四粒酒煎雞鳴時服之次日下瘀血即愈並治折傷金瘡傷筋斷旋覆花取根搗汁滴瘡中渣封瘡口神妙接指真蘇木為極細末摻於斷指間接定外用蠶繭包縛牢固數日即如故接一切骨折用公牛角一個火上炙幹一層刮下一層榆樹皮白裹楊梅葉黃米麵蕎麵亦可以上三味不拘數量傷大小加入花椒七粒共為末以陳釅醋熬成稀糊青布攤貼薄木片纏住時刻聞骨內響聲不絕俟定則折骨接上矣又方生綠豆乾搗成餅砂鍋炒紫色為度乘熱沃以黃酒調作厚鏹於損傷處厚敷用布包紮緊將骨湊好外用柳木板夾定捆住勿動內用土鱉三四個焙乾黃酒送下蓋暖令睡其骨自然接上加自然銅或漢古錢俱用炭煅紅醋淬七次研成粉共七釐同服更妙若加銅或錢忌荸薺百日下條同斷筋損骨鮮生地搗取汁好酒和服日二三次妙又搗爛蒸熟封傷處二日筋骨連續又方糯米一升皂角切碎半斤銅錢百個同炒至焦黑去錢上為末熱酒調膏貼患處神效生搏螃蟹炒掩良又牡鼠生搏敷之三日一易能續筋骨又白蠟合歡皮各五錢研溶調敷傷處極效或以清酒調下二三錢亦妙勿食雞肉萵苣子微炒為末酒服二三錢效刀斧傷切不可見水用生半夏末帶血敷上立止痛能收口生肌又熟艾拓金散止血止痛效又用松香明透嫩者堅實細炭等分研極細末絹篩篩過入瓶遇患敷之神效又桑葉為末干糝之妙又青蒿生挼敷金瘡止痛止血生肌最妙止血方凡刀斧傷或瘡口出血不止者將水調泥要干腳泥敷出血處四邊若傷頭面敷頸周圍傷手敷臂傷足敷腿能截住其血令不來潮其傷口仍用膏丹貼之又壁錢取汁點瘡上良又石榴花和石灰略陳者可為搗末糝之血便止人咬傷用熱尿洗出牙黃瘀血以蟾酥丸塗孔中或嚼生白果塗之又先以童便洗齒垢淨隨用生栗子嚼爛敷之並治馬咬傷人咬傷成瘡用龜板或鱉甲燒灰油調敷咬指傷急用人尿入瓶將指浸之一夕即愈如爛以克蛇烏龜殼灰敷之踢傷冬青葉同醋煮數沸略滴麻油少許在內取葉換貼自好下蠶室傷不和取所割勢火煅為末酒調敷不數日即愈救急治破傷風鴿糞尖者炒一錢白麵炒一兩麻不拘分兩炒存性以上三味為末如遇破傷風腫得頭如斗大或垂死者用黃酒調藥灌下即生屢驗又方用手足十指甲香油炒黃為末黃酒沖服汗出即愈真奇方也又方黃花一合炒黃好酒一碗煎八分熱服汗出即愈治打撲刃破傷風並蛇犬毒物所傷蟬蛻為末蔥涎調敷破傷處去惡水即愈或取竹瀝灌二三升即效又方天南星切開湯泡七次如急要只略泡用濕紙裹煨熱防風等分合為末每服二錢溫酒調敷若牙關緊閉腰背反張者每服三錢童便調溫服雖內有瘀血亦愈至於昏死心腹尚溫者連進三服亦可保全若破瘡傷風或瘋犬咬傷服此藥後須用熱童便或口含蔥湯傾出洗淨隨用生南星為末糝之或以熱水調敷出惡水為效又秘方荊芥五錢黃蠟五錢魚鰾五錢炒黃色艾葉三片入無灰酒一碗隔重湯煮一炷香熱飲之汗出立愈百日內不可食雞肉金瘡中風水腫蔥莖葉煨研罯敷立愈傷損腫痛瘀血流注紫黑用大黃末生薑汁調敷立消治抓破面上皮用生薑自然汁調輕粉末敷之無疤痕人身偶然皮破出血用本人鼻涕搽之可止痛生肌墜車落馬筋骨疼痛不止用玄胡索末好酒調敷二錢日進二次效閃拗手足用生薑蔥白同搗爛和麵炒乘熱敷之或活蟹打爛敷之亦妙閃腳踝作痛並治夾棍瘡用爛稻草炒灰童便拌作餅遏痛處又方綠豆炒熱以綢包裹遏之立效手足刺惡木刺及狐尿刺腫痛用蒲公英摘取白汁多塗立愈杖傷有瘀血壅腫者用磁針先刺出惡血再用黃柏大黃為末生地汁調貼之又大黃末和童便調敷亦效杖後即飲溫熱童便一碗對熱酒一盅更佳以免血攻心再用熱豆腐鋪傷處其熱如蒸其腐即紫復易之令紫色散盡轉淡血色為度內服白及末米飲下神效腫痛不可忍者用乳香沒藥細研每用二錢熱酒調敷妙飴糖熬和酒服能下瘀血野苧根嫩者洗淨每兩加鹽一錢搗敷神效杖瘡皮不破而內損者蘿蔔搗敷效夾棍傷急用熱童便一盆浸足如冷燒紅磚淬之即熱直浸至童便面上浮起白油其傷盡出矣再用肥皂搗如泥入雞子清和勻掩患處以草紙裹足縛緊一夜不可動即效內服藥末用人中白煅二兩自然銅煅五錢乳香箸炙二錢沒藥二錢牛膝三錢木耳燒灰存性五錢共為末再用牛膝煎酒調服三五錢乳香用籜二張夾盛燒紅磚兩塊壓去油以後製法同跌打損傷效方撲壓跌打從高墜下及竹木所磕落馬覆車者皆瘀血凝滯大小便通者輕不通者重以淡豆豉一合煎湯飲之或用生薑自然汁和麻油溫服之再將淨土五升蒸熱以舊布重裹分作兩包更換熨之不可太熱若骨節打折離脫搗生蟹極爛用淡酒沖服任量飲之即以蟹渣敷患處或以大蛤蟆生搗如泥敷患處縛定其骨自合又方用地鱉蟲十個酒炙蚯蚓十條焙乾自然銅二錢醋煅骨碎補三錢乳香五錢為末加蘇木銼細三錢酒煎服抓破腎囊卵丸脫落懸掛末斷教人慢慢托上多取壁錢敷貼患處日漸即安其囊如故跌破出血急忙無藥即用乾的煙末一撮敷患處紮好即止痛易完口莫透風沾水香灰切不可用至囑又方掘牆縫中石灰搓末敷效中斷耳鼻方用油發灰乘急以所落耳鼻蘸發灰綴定以軟帛縛定神效外搽七釐散尤妥穿斷舌心血出不止取米醋以雞羽作刷掃斷處其血立止仍用蒲黃末二錢杏仁去皮二錢硼砂二分共研細末蜜調噙化而愈箭鏃傷用陳醃肉去皮取紅活中之肥者細切銼濃將象牙末及人爪甲共研極細拌入肉內勻搗合一厚敷箭鏃周圍其鏃自迸脫又方螻蛄取汁頻塗五七次或用鼠腦塗之亦可又好磁石著其上俱自出又頭上黑蝨及人牙齒同研塗之即出治箭鏃竹木器傷方用艾絨攤成餅子將火硝研細末鋪上再用大蜣螂搗成末鋪火硝上包傷處一日夜即出竹木刺入肉蜣螂研末敷之即出又方蓖麻仁槌敷極效又方用象牙磋末水調敷之即出治魚刺入肉亦可又牛膝嚼敷亦可又土狗搗爛敷之俱效箭鏃及鉛彈傷方干莧菜搗爛和砂糖塗之皆可出箭鏃及針物不出或在咽喉用螻蛄即濕地上夜鳴拉呼腦子搗如泥敷上不過三五次即出針刺入肉陳臘肉連皮並肥者貼之自出又象牙屑水調塗其上亦出余同箭鏃傷又螻蛄腦同硫磺末研敷覺癢自出治疤方橄欖核磨汁塗之久而無痕竹刺入喉用銅錢燒紅酒淬鍾乘熱飲之自效吞金凡誤吞五金以飴糖半斤啖之吞銀用韭菜一把入滾水略煮不切斷淡食之少刻菜包銀嘔出或從大便下吞銅錢以羊脛骨燒灰研末米飲下三錢立效吞金亦用羊脛骨灰米飲下三錢吞錢哽喉取雞冠血入喉內用銅盆盛至面前將冷水向小兒一噴錢出吐落盆中吞銅多食荸薺即慈菇自化吞鐵物將木炭皮及鐵鐘研極細末沙糖和丸一云沙糖調稀粥炭末數錢服三四碗即出和丸則每丸三錢又吞鐵用磁石芒硝各一錢煎服數次鐵自化又吞金銀銅鐵多食肥肉自從大便出又吞金戒箍重三錢余者用升麻八分火麻仁去殼一兩煎湯灌之兩劑金從大便出又誤吞鐵釘用磁石五分研末芒硝五分研豬油一勺同服神效吞針取田雞眼烏珠一對合水囫圇吞下其針兩頭穿珠立刻吐出冬天無田雞在桑樹底下掘深三尺自有又小兒吞針將半生熟出芽蠶豆搗爛用韭菜汁為丸吞下又凡吞針用鹽蛋一個韭菜一把略煮不切食之即裹針從大便出喉中為諸物所哽用象牙磨水飲之即效諸骨哽用野苧麻根搗爛為丸如梧子大某骨哽即為某物熬湯如雞骨哽即用雞骨熬湯送下即效諸骨哽威靈仙二錢用沙糖和酒煎口服立下又用犬吊其一足取其涎嚥下亦可又方鳳仙花子二十粒白湯送下或用玉簪花亦妙俱不可著齒恐其損落魚骨卡喉用椿樹皮煎水噙含片時服下其刺如綿或下或出又用橄欖並核打破煎服亦妙或取貓涎咽亦下吞發繞喉附吞竹葉木屑方將亂髮燒灰開水調下即愈又吞竹葉卡喉刮取牛口涎開水對服即下吞木屑以鐵斧磨水灌下妙傷眼耳打傷眼睛如突出者急要揉進用初宰鮮豬肉一厚片將當歸赤石脂末少許糝肉上貼之去毒血即愈煙渣入目凡誤犯者切勿將湯洗愈洗愈痛恐致廢瞎用亂頭髮或棕纓緩緩揉之即愈打鐵時被燃鐵屎暴入目內用真磁石吸之自愈魚刺卡方法尺𧍧同席有人卡者隨以手默畫上面尺𧍧符照式不鉤畫於桌上畢問卡者曰好了麼或令其咳嗽一聲愈水銀入耳以黃金枕耳邊自出若水銀入肉令人筋攣以金物熨之水銀乃出蝕金其病即瘥中毒箭以犀角刺瘡中立愈又方急飲麻油一碗以人糞塗傷處又方飲藍靛汁一碗並塗傷處均效鳥槍傷凡槍子打入皮肉用生南瓜切片貼患處即出又方用蜂蜜半斤煎滾入好頭燒酒一斤好黃酒亦可隨量熱服其子當黏衣被上出鐵子不出用陳肥臘肉蘸真磁石末貼之自出鉛子若在肉內未入腹中者用水銀灌入瘡熔化成水再以金器貼近瘡口徐徐轉揩數十次或以小金條兩根連換檢插瘡中水銀蝕金而出湯火傷最忌浸冷水中防火毒攻心並勿服寒冷之藥平日取老黃瓜不拘多少瓷瓶貯之藏暗濕處自爛為水將此水抹患處立刻止痛且不起泡又以人乳拌鉛粉雞毛調敷患處專治初經湯火者又以白蘞大黃等分為末麻油調敷神效如藥不便先服童便以護其心使火不能內攻隨取大黃末用桐油香油均可調敷即垂危者皆保無虞又用雞蛋清柏葉汁麻油調勻敷患處即愈又方槐花子生大黃地榆芙蓉粉等分為末雞子白加麻油二匙調敷治湯火傷急便方切勿以冷水冷物井下泥及溺泥激之致令火毒攻心當先以熱童便飲之凡湯火傷先以鹽末擦傷處護肉不壞然後用藥敷之急用菜油擂門限下人足多踏之土搽上即愈並不起泡但宜及時趕搽多搽數遍更好太緩則起泡方力多減無菜油則麻油茶油亦可又方鰣魚蒸下油以瓦瓶盛埋土中取塗湯火傷最效又熱小便淋洗數次亦可生肌自愈又方治爛至肌肉者用燒柴灶百草霜三錢輕粉錢半共研細香油調敷之又方用菜油一碗浸一刻即止痛兩三日退皮如不便浸頻頻塗之又方搗側柏葉敷之又石膏末敷或絲瓜葉搗爛敷一日即愈一法用好杭粉同婦女所用好頭油調塗之或柏子油亦可又方傷未破者用劉寄奴為末先以糯米漿雞翎掃傷處後糝藥末並不痛亦無痕又方用大麥以淨砂鍋炒漆黑色為度取出隔紙攤土上出火氣研末爛者干搽破者以香油或生桐油調搽又方白芨末或地榆末各用香油調搽俱效一切火傷用足紋銀麻油磨塗即愈且無疤痕極粗碗底可以磨之又方茶葉嫩佳者嚼爛敷患處即愈要漱淨齒垢方可嚼茶葉火藥傷爛痛用蚌殼研末鹽蘿中者方妙爛茶葉同搗塗之立效湯火傷凡湯潑火燒急覓水中大蚌置瓷盆中將其口向上無人處用冰片三分真當門麝三分為細末俟大蚌口自開時以匙挑冰麝一二分傾入蚌口內其口自合而蚌內之肉悉化為漿然後再入冰片少許用雞翎黏掃傷處先從四邊圍層層掃入每日用兩三枚痛處自減及其火氣已退將用下蚌殼燒灰存性研細末入冰麝少許自邊圍掃如無蚌處用冰片從四面摩起漸及於中亦可漸愈又方用多年陳醬寬寬塗之但愈後自有黑癊又方著人嚼生芝麻塗隨干止痛如患處寬大令眾人共嚼塗之即愈又方舊葫蘆瓢燒灰塗之或以麻油調敷亦可救火滅良方左手捏三山訣持雞蛋一個右手捏劍訣向蛋上將咒語默唸空寫七遍即投之火中自滅一個不靈七個即滅咒語曰敷施發潤天尊火藥燒湯火傷極重諸藥不效者牛口刺根搗汁用雞翎刷患處即愈此仙方也煙燻欲死者用生白蘿蔔嚼汁咽之立爽諸物咬傷毒蛇咬傷用蒲公英搗爛貼上即愈又方用雞蛋敲破蛋頭合在蛇咬處蛋變黑色再用一蛋合之俟蛋內黃白不甚黑再用一個合之即愈兼治蜈蚣蠍子咬傷又方將夜壺內尿垢用津唾研爛搽之立愈又方以大藍汁一碗雄黃末二錢調勻點在傷處並令徐徐服其汁如無藍汁以靛花或青黛代之又方立將傷處用繩絹紮緊勿使毒入心腹令人含米醋或燒酒吮其傷以吸拔其毒隨吮隨吐隨換酒醋再吮俟紅淡腫消為度吮者不可誤咽中毒又方白芷末一兩煎服再用白芷末加膽礬日日搽之被蝮蛇齧死用香白芷末二錢麥冬湯調服急則以水代飲之即活仍調白芷末敷傷處效又方五靈脂一兩雄黃五錢以酒調灌二錢再以渣塗傷處齧傷者麻油二三盞護心解毒吮後亦以薑末敷之又方雄黃研末二錢調酒服之又以數錢調敷患處即效又萵苣取汁合雄黃末作餅子候乾為末貼瘡口毒水流出腫痛即消愈卒被咬傷用白礬火上融汁滴咬傷處立效無白礬則作艾炷灸五壯良凡蛇咬傷者先飲好醋一碗或麻油毒氣不隨血走毒蛇螫傷急切無藥以熱人尿洗出血取口涎搽之又方以人屎厚敷布裹之即消中蛇毒口禁眼黑欲死者用蒼耳嫩葉一把搗取汁溫酒和灌之渣敷瘡口又方青木香水磨敷之仍煎湯飲妙又貝母研末六七錢酒調令病人儘量飲之少刻酒自傷處化水流出卻以渣敷患處即蘇又絲瓜根搗研生酒調吃一醉立已凡蛇毒取獨頭蒜或小蒜或苦苣或水蓼各搗汁飲之以渣敷傷處俱效以上各方內俱量加雄黃末尤妙上虺蛇咬急拔去頭心紅髮一根用生何首烏搗汁沖酒服之其渣敷患處痛立止凡蛇蠍蜈蚣咬傷用五靈脂研塗傷處立愈蜘蛛咬傷腹大如孕一身生絲用羊乳飲之幾日即平遍身成瘡者取好酒飲令醉須臾蟲於肉中如小粟自出又方藍汁一碗細飲其汁並點咬處即效又雞冠血塗之亦效桑白皮搗汁塗立愈或蔓荊子油薤白汁各塗咬處俱效蛇遺水毒誤飲腹中必生蛇水調雄黃服即下虎咬傷先飲清油一碗取白礬為末納傷口又砂糖水調服之一二碗並塗傷處又生葛汁飲之及洗瘡口又飲酒令大醉當吐出毒氣良又少飲麻油亦效又方生薑白礬搗敷仍飲薑汁解毒效治蠍刺傷蠍有雌雄雄者痛在一處井泥敷之雌者痛牽諸處取瓦檐溝下濕土敷之無雨時則取新水從瓦土淋下取濕泥敷之用蝸牛角搗爛敷之極妙蝸角即扁身天螺獅蠍咬用銀硃雞蛋清調敷又方生半夏白礬等分和醋敷傷處即愈又膽礬搽之立消蠍螫痛甚取冷水漬之即不痛水微溫復痛即易新水漬之又薄荷細嚼敷之亦瘥癲狗咬傷用野菊花研細酒調服盡醉效無花則用根葉四兩煎酒二碗水二碗七分服一方用人糞塗於患處新糞尤好諸藥不及此又法急至溪河將傷處洗擠血淨盡多飲生薑汁則毒可解仍封扎傷口勿使受風又方用防風獨莖者一兩天南星一兩泡七次曬乾共為末每服一錢白湯送下半日再進一服汗下即愈一方口含漿水洗淨用天南星切片淡姜水炒二錢真防風二錢共為末干貼傷處效不更發又常飲韭菜汁以渣封瘡口不再發又方乘毒未發時用斑蝥幾個同米炒老黃色去斑蝥用米研末蒸雞蛋二個食之於小便內取下血塊痛脹不解則血塊未盡仍再食之血塊盡乃止毒發狂作犬聲者毒入心矣用蛤蟆膾食之效又虎頭骨虎牙研末每服二錢愈瘋犬咬傷日久復發用雄黃明者五錢真麝香五分共為末酒調敷二錢服後必使得睡切勿驚動聽其自醒須利下惡物乃效又方用蚯蚓糞敷出犬毛毒氣乃散獅犬傷與上條略同急於無風處吮出惡血無血則以針刺出血小便洗淨香油調雄黃末少加麝香敷之如倉卒無藥以百草霜麻油調敷或蚯蚓糞厚敷之皆能急救散毒法生麻油研豆豉為膏丸如彈子大常揩拭所咬處卻掐開看豉丸內若有犬毛此毒氣已出另換一丸揩至無茸毛乃痊可狗咬成瘡用白果去殼嚼細塗之即效鼠咬傷用貓毛燒存性入麝香少許略研香油調塗患處效蜈蚣咬傷用雄黃末醋調塗之又白礬生薑半夏等分研末醋調塗之又桑白皮搗汁塗傷口或獨頭蒜研貼之又蝸牛取汁滴入咬口又烏雞冠血及屎塗之又人頭垢塗之不痛不癢又青油點紙燃取煙燻之又鹽湯漬之又黃蠟火上熔汁滴患處俱效又法用生蜘蛛放在傷處蜘蛛自會向傷口吸毒須臾毒盡即將蜘蛛放在水中可救蜘蛛雜色諸蟲傷用青黛雄黃等分為末新汲水調服二錢又外敷之又大紙燃蘸香油點火吹滅以煙燻之即愈又以麝香塗之又生雞蛋輕輕敲一孔合傷處即愈蚯蚓傷中毒腹大夜聽蚯蚓鳴用鹽水漬之或先下鹽湯一杯尤妙又以石灰水浸之又以雞屎或鴨屎敷之又老茶葉研末油調敷之蠶咬傷川芎和醬汁研敷又苧汁飲之並塗患處螻蟈傷用石灰和醋塗患處即愈神效蝸牛傷用蓼子取汁浸傷口即效壁獍咬人必死桑枝燒灰淋取汁調白礬末敷傷處即愈又方雄黃末磨醋塗之可愈救諸毒解砒毒服砒未久毒在上宜吐之若時既久毒入腹則不能吐出須用黑鉛等方下之即先吐者亦宜服鉛水鴨血等以盡餘毒其症煩躁如狂心腹絞痛頭旋欲吐不吐面色青黑四肢逆冷又或悶厥心頭微溫命在須臾者用綠豆半升擂去渣以新汲水調通口服又方炒柏子殼三錢紅土三錢同研細末雞蛋清調服服後作一寒顫即愈重者不過兩服又方用真靛花二錢分二服以井花水濃調服之又方用細葉冬青汁頻灌即解又方無花果五錢研末冷水調下即活又楊梅樹皮煎湯二三盞服之又方用黑鉛磨水灌之又方毒在腹中禾稈燒灰新吸水淋汁濾清冷服一碗毒隨利下又方生油灌之令吐又方熱鴨血灌下立解又方用防風四兩煎湯冷飲之即解又方桐樹葉搗爛沖生白酒服之又用糞清灌之亦解又方臘肉豬膽水合服之立解又方用明礬一塊水一碗用銀簪順打起沫吹去沫又打又吹沫盡止飲下吐出即解矣打沫不可逆行必要順打為妙又方紫蝴蝶花根搗汁一碗灌下立愈又用熟豆腐漿灌之亦解又方以淡豆豉濃煎湯服之可解又方甘草水煎濃汁用藍汁飲之即愈解斷腸草毒即野葛一名鉤吻江西人謂之黃藤根粵人呼為胡蔓草又名大葉茶先用鴨蛋三個將服毒人扶正撬開牙關剝開蛋殼待蛋入胃裹住毒草次用豬膏融化溫和灌之一飯碗後用黃豆半升同筍雞一隻連毛帶腸搗爛同清水一碗半煮熟布袋濾去渣取汁灌下其毒即吐如不吐即用芋苗探喉鵝羽亦可吐出即愈其毒在胃者可治入腸者難治又方用蕹菜生搗汁飲一二茶杯即愈冬春用蕹菜子一兩煎服治胡蔓同解胡蔓草毒治鉤吻同前急將大糞汁灌之可解或以嫩葉心浸水涓滴入口百竅潰血急用抱卵不出之雞蛋研細和麻油開口灌之吐出可救少遲則難治余同上條解鼠莽草毒可與前兩條同治用黑豆取汁服之可解其毒又方用枯蓮房殼帶蒂梗陰乾㕮咀一兩半煎水二三碗將冷灌之如無蓮房用荷葉中心蒂七個或用藕節七個煎湯一碗溫令灌之毒即解解信毒即砒霜未煉過者速取梁上燕子窠用井水三四大碗放桶內將手攪調用夏布手巾如榨腐法篩去泥土取泥水連灌三四碗自吐不吐再灌吐盡即醒余與上條解砒毒同治一切藥蠱金石毒俱用石蟹以熱水磨服即效服銀黝毒以生羊血灌之吐盡即愈或黃泥水亦可解鹽滷毒用生豆腐漿灌下再以鵝翎絞喉數次令吐即活又方急將白糖四兩湯灌下垂死者即活又方用生羊血灌之亦可又方將常用搽桌布洗水灌之使吐即解又方用生大黃一兩搗碎再用豆腐漿同搗數十下服後瀉數遍即愈又方用黃豆入水搗汁灌之亦效解巴豆毒中巴豆毒痢不止以大豆一升煮汁飲之可解或紅豆煮汁亦可又以冷粥一碗食下亦解又方以芭蕉葉搗自然汁服之即止又方用葛根搗取汁飲之又以冷水浸兩手足極效忌食熱物又藍根沙糖擂爛和水服之又巴豆畏大黃黃連蘆筍菰筍各水煎水冷服皆能止泄中鳩鳥毒用乾葛末每服二錢井水調下即愈中河魨毒毒在肝血脂子井眼又忌煤塵落入鍋釜用橄欖汁或糞汁蘆根汁俱效或白茅根搗汁冷飲亦愈又方用白礬研末白湯調下探吐之馬毒開剝死半馬中毒遍身生紫疱俱潰叫痛急服紫金錠吐泄則愈馬汗入人瘡內毒氣攻心悶欲絕燒粟稈灰濃淋作汁煮熱蘸瘡於灰汁中出盡白沫即瘥又用馬齒莧搗敷並取汁飲之又以冷水浸瘡數易飲好酒立愈驢涎及馬汗入瘡用柘白礬黃丹炒等分調貼之中牛馬肉毒甘草煮濃汁飲一二升或煎酒服或吐或下如渴不可飲水飲之則死食馬肝致毒用豬骨灰或牡鼠屎或豆豉或狗屎灰人頭垢每一樣水服俱效食鱉過多或遇毒用木香錢半略研煎服可解莧菜與鱉同食腹生小鱉用馬尿熱飲一二碗即瘥白馬尿更妙凡中魚鱉毒者飲靛汁即愈或陳皮湯亦可竹雞斑鳩夏食生半夏人多食亦中毒用生薑汁飲之如口噤者撬齒灌入即活中鉛粉毒以麻油調蜂蜜服之其毒自解或飴糖亦可中煤炭毒房中置水一盆並使窗戶有透氣處則煤炭雖毒不能為害受毒時頭暈而心口作嘔者即是急用生蘿蔔汁灌之或生鹹菜水飲之即解食隔夜菜誤受蟲毒用生鴨血飲之再煮熟鴨肉食之其毒自解蒙汗毒多飲涼水即安守宮毒驚蟄至九月茶水未蓋者經宿則不可飲守宮之性見水即淫餘瀝遺水最毒誤飲守宮毒水急用地漿水解之門限下泥常踏者取數兩以新汲水攪數遍澄清飲可救一二莨菪毒中此毒則衝心大煩悶眼生星火狂亂奔走時見鬼怪抬磨針水研綠豆汁飲之又方甘草薺苨煎汁飲或藍汁飲下亦可又犀角磨水飲又以蟹汁服之又甘草黑豆煎湯服艾毒久服艾葉則熱氣衝上狂躁不禁眼內生瘡或有血出用甘草黑豆煎湯服或藍葉汁綠豆汁飲之俱可解過食豆腐毒生瘡噫氣遺精白濁切忌飲酒用蘿蔔或子煎湯飲之又杏仁水研取汁飲之多食熱面毒用蘿蔔汁無生者用子水研汁服又赤小豆末沸水服即愈川椒毒閉口川椒有毒人吞之使氣欲絕或下白沫身體冷痹誤食閉口椒戟喉氣閉吃大棗三四枚解之又飲井水一二升便瘥又地漿飲之又濃煎黑豆汁將冷飲之俱效杏仁毒杏子雙仁有毒誤服必死藍葉汁飲之又藍實研取汁飲之又地漿飲之三碗又用香油多灌之俱效解苦杏仁毒炒半生半熟即有毒用杏樹皮煎湯飲之雖迷亂將死者亦可救解斑蝥芫青毒用大黑豆汁服之即效小黑豆亦可又方用肥皂水灌下再以鵝翎攪喉數次令吐即活又戎鹽湯或藍青汁服之並瘥又方用生雞卵或鴨卵開孔灌入口中連灌五六枚得吐即活倘口閉以箸抉開灌入多食萵苣中毒此菜內加以生薑可制之以生薑服之毒可解治菌蕈毒如菌蕈夜中有光者欲爛無蟲者煮不熟者煮的汁照人無影者上有毛下無紋者即卷赤色者皆有毒中之殺人掘地一穴以冷水攪之令濁少頃取飲可解又馬蘭根葉搗汁飲之又楓樹菌食之笑不止而死用地漿最妙人糞次之或用冬瓜蔓汁解之救諸菌毒用苦菜白礬掬新汲水挼咽之誤食毒蕈即採生金銀花嚼之可解治菌毒亦同又六畜及鵝鴨之類刺取熱血飲之可解又油煎甘草冷飲只多飲香油亦可中蕈毒吐下不止用細茶芽即雀舌茶為末新汲水調服神效又方用荷葉搗爛和水服之又鯗魚頭煮汁飲之亦效藜蘆毒人中此毒吐逆不止蔥白汁飲之可解或雄黃末和水服亦可又方香油或溫湯飲苦楝毒中苦楝根毒瀉不止用冷粥食之可止礬石毒用黑豆煎汁飲之可解硫黃毒中者令人心悶用豬血或羊血乘熱飲之俱效又宿冷豬肉或鴨肉羹冷食之又方黑錫煎汁飲亦效水銀毒用肥豬肉冷食之又以豬脂食之俱效碙砂毒用生綠豆研汁一二升飲之即解大戟毒令人泄瀉不禁煎薺苨或搗菖蒲汁飲之狼毒毒杏仁研水和取汁服或藍葉汁白蘞末和水服之俱可解躑躅毒梔子煎湯飲又甘豆湯飲亦可甘遂毒黑豆煎汁飲之半夏毒生薑汁飲之又幹姜煮汁服之亦可芫花毒柑皮煎汁飲又甘草或防風煎湯服苦瓠毒吐痢不止以黍欀灰汁飲諸石藥毒以雁肚服之又白鴨屎為末和水服多食海菜毒腹痛發氣口吐白沫以熱醋飲即安燒酒醉死燒酒不可用錫器盛燉及過宿貯久則飲之殺人用鍋蓋上氣流水灌下半碗即活又方以井底泥攤其胸浸發冷水中飲以綠豆水可解又諸酒致毒惟綠豆粉湯可解之又飲酒中毒經日不醒者用黑豆一升煮汁溫服一杯三次即愈解飲饌毒凡中飲饌毒不知何物即煎甘草薺苨湯飲之便效解百毒用生雞子清調白礬末可吐眾毒綠豆甘草湯亦解百毒又法在上不論何毒多灌香油探吐即安毒在下只以芒硝甘草湯利之亦可又解毒丸用板藍根四兩貫眾去毛青黛水飛甘草各一兩煉蜜為丸梧子大另以青黛為衣毋論飲食百物毒稍覺精神恍惚急取十五丸爛嚼新水送下兩次即解菜蔬毒食諸菜中毒發狂煩悶或吐下用葛根濃煎汁服佳又豬骨燒灰沖水服良又多飲香油又人乳汁或童便飲二升愈郁肉肉盛密器蓋之隔宿名郁肉有毒漏脯茅屋漏水沾濕脯名漏脯有毒用黑豆濃煎汁飲數升即解又多飲人乳汁又搗韭菜汁服二三升皆可解雜瓜果毒桂心為末飯丸綠豆大用水吞下十數丸即愈加以麝香尤妙瓜毒石首魚炙食數枚或煮汁服之亦可六畜肉毒犀角濃磨汁一碗服之又水浸豆豉取汁數升服亦可又胡荽子一升煮汁停冷每服半升日兩次又搗生韭菜絞汁飲俱效食自死六畜毒用黃柏末二三錢水調服不解再服食自死鳥獸肝中毒用人頭垢一錢煎湯化服食牛馬肉中毒用蘆根取汁飲一二升又多飲清酒即解濁酒亦可牛馬肝毒用人乳汁飲一二升立愈食牛羊肉中毒以甘草汁一二升服之食狗肉不消用蘆根搗汁飲之又杏仁一升去皮研水二升煎去渣分三服食鵝鴨中毒糯米泔飲或溫酒飲又秫末水研取汁服一杯食雉肉中毒吐下用犀角磨濃汁飲一碗食中毒箭死鳥獸肉及野鳥肉毒用貍骨燒灰和水服又黑豆汁或藍汁亦可食魚中毒飲生冬瓜汁最驗又濃煮冬瓜汁飲之食蟹中毒生藕汁冬瓜汁煮蒜汁紫蘇葉或子煮汁飲之俱效食鱔中毒以蟹食之即解或豆豉汁飲之亦可食魚膾不消食魚腦即消凡食魚過度亦食魚腦為妙又以生薑汁服亦消多食生膾成癖取水中小石子數十枚燒紅投五升水內復取出燒赤再投七次即熱飲之三五服即解食鱔食鱉毒用豆豉一合新汲水半碗研濃飲頻頻服之即愈凡食生肉中毒以地漿飲之可解物性相反誤食傷人甘草與鮕魚同食殺人蟹與柿反黃瓜與花生反南瓜不可與羊肉同食犯之立死豬肉得胡荽爛人臍羊肝得生椒爛人臟河豚同鹿肉食殺人河豚風慄並食有毒羊肉同膾酪食害人膾生同酥乳食之變諸蟲鱉肉與莧菜食之還生鱉荊花落魚羹即殺人石膏與蕎麥麵同食殺人服木鱉子啖豬肉殺人食黃嗓魚犯荊芥殺人食驢肉亦最忌荊芥蜜鮓並食有毒至死者茅舍漏滴肉上食之殺人獸有歧尾蟹有獨螯羊一角雞四足鱉三足白鳥烏首烏雞白首白馬青蹄黑馬白蹄魚無腸膽牛肝葉孤飲瓶花水有毒瓶浸臘梅尤甚採草藥夾雜毒物能殺人鱓魚昂頭出水二三寸者有毒殺人蛇虺涎滴入飲食中殺人淘積糞坑穢水入口即死淘古井須防冷毒致死百足蟲毒殺人服官粉殺人即鉛粉曼陀羅鬧陽花釀酒令人狂笑昏沉不語多服仙茅舌脹大難治以小刀刮之至百十下有血出乃縮即用大黃芒硝煎服二三碗仍以蒲黃青黛黃柏末或冰硼散等藥搽之可愈老雞過數年有毒養生家雞老不食夏不食雞水毒江河溪澗水初漲時汲之煮食有毒害人用貫眾一二枚放水缸內以雄黃二錢明礬二錢入水內俟澄清方可飲食缸底泥須去之避蠱毒如入蠱鄉飲食即潛於初下箸時收藏一塊在手盡吃不妨少頃即將所藏一塊潛埋於人行十字路下即蠱於其家作鬧蠱主必反來求教或食時讓主家先動箸或明問主家云莫有蠱以箸築桌而後食則蠱不能為害又方雄黃末少許灑於酒中先食大蒜再食他物主家見之即不下蠱中蠱毒如中蠱毒先以白礬末令嘗不澀覺味甘次食生黑豆不腥乃中蠱也毒在上則服升麻以吐之毒在下則服鬱金以下之或合升麻鬱金以服之不吐則下又方濃煎石榴根皮飲之不下即吐出蟲皆活又方以白礬牙茶搗為末冷水調飲即愈又方用鰻鱺魚乾末空心服之魚或燒炙令香食之其魚有五色紋者尤佳一方土常山三錢煎服又馬兜玲三錢煎服俱效又用甘草白礬為末清水調服或吐或下即安又方燕屎三合熬獨蒜三枚和搗為丸梧子大每服三丸日三五服蠱當隨利下而出又胡荽根即芫荽根搗汁半升和酒服蠱立下又取胡荽子研水煮取汁冷服半升日二次即下又桔梗搗汁飲之又薺苨搗飲之愈或末煎服俱效又以大蒜常食之可凡中蠱毒以紫金錠磨服一二塊俱效凡服藥已瘥自後飲食永不得吃冷物以免再發不救凡沾蠱瘥後忌酒及一切肉食毒物一月惟軟飯可也中蠱之時常食燒酒與大蒜良金蠶蠱毒驗法用白礬生豆如前取兩刺蝟置病人房中搜擒其蟲又方石榴花濃煎汁飲之吐出活蟲即愈又蝟皮燒為末和水服一錢當吐蟲出即愈送蠱法中蠱欲死取蘘荷葉密安病人臥席下勿令病者知病者呼蠱主姓名令其收去即安炙蠱毒於足小指尖上艾炙三壯良有物出飲酒得之隨酒飯出肉菜得之隨肉菜出即愈神效皆於炙瘡上出挑生毒嶺南人挑毒於飲食中以害人其候初覺胸腹作痛次漸攪刺十日則物生能動在上則胸痛在下則腹痛在上者用膽礬末五分投熱茶內化毒探吐之在下者用鬱金末二錢米飲調服當瀉下惡物後以四君子湯去甘草調理脾胃有人脅下腫起頃刻如碗大此挑生毒也五更時以生綠豆試嚼之覺香甜即是用升麻研細末取開水冷定調服六錢連服二三次痛泄中蔥數莖根鬚皆具腫則消縮仍服平胃散調補而愈吞鴉片煙毒輕則心中發燥急用活鴨血或鵝血灌之或醬油或涼水多灌之吐出鴉片煙即愈或用白礬雄黃同研末清水調灌亦效若服多毒重則身冷氣絕似乎已死若肢體柔軟實未死也乃鴉片性烈醉迷之故將其人放在潮濕陰地用筷撬開牙齒又以竹筷一枝橫放口內令口常開時以冷水一杯灌之有金汁灌之更妙外以冷水在胸前摩蕩每日夜十餘次又用冷水一盆將頭髮散放水盆內漂之三四日後鴉片之氣退盡即活切勿見太陽若一經日照便不可救但身不僵硬不變色七日以內毋遽棺斂曾見以此法救之皆活又方用燈油頻灌吐即愈蓋煙膏見油不散惟調酒服者難救野芋毒野芋自生溪澗間葉與芋相似而形差小誤食之殺人惟以地漿與糞汁飲之則活又方大豆煎濃汁多溫飲之甚效芋種三年不採成芋誤食並殺人治法與上同
